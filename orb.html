<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aloe</title>
    <style>
      /* globals.css's body::before/::after decorate the full web app's page background —
         they're position:fixed full-viewport blurred gradients that don't inherit this
         window's transparency, so on this tiny orb window they show up as a solid haze. */
      html, body, #root { background: transparent !important; overflow: hidden !important; }
      body::before, body::after { display: none !important; }
    </style>
  </head>
  <body style="background: transparent; margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/orb.tsx"></script>
  </body>
</html>
